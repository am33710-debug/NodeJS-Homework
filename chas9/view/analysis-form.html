<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis</title>

    <style>
        * {
            margin: 50px;
            padding: 0;
            font-size: 1.5rem;
            box-sizing: border-box;
        }
        form {
            text-align: center;
            margin: 20px;
            padding: 20px;
            background-color: bisque;
            border: 1px solid black;
            border-radius: 1rem;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        form button {
            height: 50px;
            width: 150px
        }
    </style>
</head>
<body>
    <form action="/analysis" method="post"> <!-- Formular -->

        <label>Your Analysis Here:</label>
        <textarea name="text" placeholder="Your Analysis" required></textarea>
        <button type="submit">Submit</button>

    </form>
</body>
</html>
